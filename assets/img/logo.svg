<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="Surviving the Feds">
  <!-- ====================================================================
       PLACEHOLDER LOGO — swap this file with the official Surviving the Feds
       mark when ready. Keep the same filename (assets/img/logo.svg) and the
       whole site updates automatically. The emblem + wordmark below are built
       to read well on the dark, defiant theme.
  ===================================================================== -->
  <defs>
    <linearGradient id="stf-emblem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E63946"/>
      <stop offset="1" stop-color="#9E1B26"/>
    </linearGradient>
  </defs>

  <!-- Emblem: a shield split by an upward "freedom" bar -->
  <g transform="translate(4,8)">
    <path d="M32 0 L62 10 V34 C62 50 49 60 32 64 C15 60 2 50 2 34 V10 Z"
          fill="none" stroke="url(#stf-emblem)" stroke-width="3"/>
    <!-- prison bars breaking into an upward arrow -->
    <path d="M20 46 V22 M32 46 V14 M44 46 V22" stroke="#F2F3F5" stroke-width="3" stroke-linecap="round"/>
    <path d="M22 20 L32 8 L42 20" fill="none" stroke="#E0B43B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(82,0)" fill="#F2F3F5" font-family="'Oswald','Arial Narrow',sans-serif">
    <text x="0" y="34" font-size="27" font-weight="600" letter-spacing="1.5">SURVIVING</text>
    <text x="0" y="64" font-size="27" font-weight="600" letter-spacing="1.5">THE <tspan fill="#E63946">FEDS</tspan></text>
  </g>
</svg>
